<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 72">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="saturate" values="3" result="cb"/>
      <feMerge>
        <feMergeNode in="cb"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background for favicon contexts -->
  <rect width="110" height="72" rx="10" fill="#0a0a14"/>

  <g filter="url(#glow)" stroke="url(#g)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- M: thin entry hairline -->
    <path d="M 8,60 C 8,50 9,36 11,20 C 12,12 13,7 14,5" stroke-width="1.4"/>
    <!-- M: thick first downstroke -->
    <path d="M 14,5 C 17,18 19,34 20,50 C 21,56 21,60 22,63" stroke-width="5.5"/>
    <!-- M: thin valley connector -->
    <path d="M 22,63 C 23,55 25,42 28,28" stroke-width="1.4"/>
    <!-- M: thin upstroke to second peak -->
    <path d="M 28,28 C 30,18 32,10 34,5" stroke-width="1.4"/>
    <!-- M: thick second downstroke -->
    <path d="M 34,5 C 37,18 39,34 40,50 C 41,56 42,60 42,63" stroke-width="5.5"/>

    <!-- Connecting M → S (thin flowing curve) -->
    <path d="M 42,63 C 46,56 50,44 54,30 C 56,22 58,14 60,8" stroke-width="1.4"/>

    <!-- S upper curve -->
    <path d="M 60,8 C 62,5 66,4 70,5 C 74,6 76,10 74,14 C 72,17 68,18 64,17" stroke-width="3.8"/>
    <!-- S crossover hairline -->
    <path d="M 64,17 C 61,18 59,22 61,26" stroke-width="1.3"/>
    <!-- S lower body (thick) -->
    <path d="M 61,26 C 65,29 71,32 75,37 C 79,42 77,50 72,56 C 67,61 60,62 55,58" stroke-width="4.2"/>
    <!-- S exit tail -->
    <path d="M 55,58 C 53,56 52,53 53,50" stroke-width="1.3"/>
  </g>
</svg>
